<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1A237E"/>
      <stop offset="100%" style="stop-color:#0D47A1"/>
    </linearGradient>
    <linearGradient id="faceGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E3F2FD"/>
      <stop offset="100%" style="stop-color:#BBDEFB"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <circle cx="50" cy="50" r="48" fill="url(#bgGrad)"/>
  
  <rect x="25" y="30" width="50" height="45" rx="8" fill="url(#faceGrad)" filter="url(#glow)"/>
  
  <rect x="32" y="38" width="14" height="10" rx="3" fill="#0D47A1"/>
  <rect x="54" y="38" width="14" height="10" rx="3" fill="#0D47A1"/>
  
  <circle cx="39" cy="43" r="3" fill="#00E5FF" filter="url(#glow)">
    <animate attributeName="opacity" values="1;0.5;1" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="61" cy="43" r="3" fill="#00E5FF" filter="url(#glow)">
    <animate attributeName="opacity" values="1;0.5;1" dur="2s" repeatCount="indefinite"/>
  </circle>
  
  <rect x="35" y="58" width="30" height="4" rx="2" fill="#90CAF9"/>
  <rect x="38" y="60" width="6" height="2" rx="1" fill="#0D47A1"/>
  <rect x="47" y="60" width="6" height="2" rx="1" fill="#0D47A1"/>
  <rect x="56" y="60" width="6" height="2" rx="1" fill="#0D47A1"/>
  
  <rect x="45" y="22" width="10" height="12" rx="2" fill="#BBDEFB"/>
  <circle cx="50" cy="18" r="4" fill="#00E5FF" filter="url(#glow)">
    <animate attributeName="r" values="4;5;4" dur="1.5s" repeatCount="indefinite"/>
  </circle>
  
  <rect x="20" y="45" width="5" height="12" rx="2" fill="#90CAF9"/>
  <rect x="75" y="45" width="5" height="12" rx="2" fill="#90CAF9"/>
</svg>
